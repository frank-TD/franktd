<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嗨萌马短视频创作管家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-height: 70vh;
            overflow-y: auto;
        }

        .message {
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 15px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-in;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: #f0f2f6;
            color: #333;
            margin-right: auto;
        }

        .message strong {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-wrapper button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-wrapper button:hover {
            transform: translateY(-2px);
        }

        .input-wrapper button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .quick-btn {
            padding: 10px 20px;
            background: #f0f2f6;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .quick-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .message {
                max-width: 95%;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .quick-questions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 嗨萌马短视频创作管家</h1>
            <p>智能选题 · 热点捕捉 · 创意生成</p>
        </div>

        <div class="status" id="status">
            正在连接服务器...
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- 消息将在这里显示 -->
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入您的问题或需求..." />
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>

            <div class="quick-questions">
                <button class="quick-btn" onclick="sendQuickQuestion('生成今日选题清单')">生成今日选题清单</button>
                <button class="quick-btn" onclick="sendQuickQuestion('搜索抖音热门话题')">搜索抖音热门话题</button>
                <button class="quick-btn" onclick="sendQuickQuestion('分析儿童安全教育方向')">分析儿童安全教育方向</button>
                <button class="quick-btn" onclick="sendQuickQuestion('推荐泛流量爆款选题')">推荐泛流量爆款选题</button>
            </div>
        </div>
    </div>

    <script>
        // API配置
        const API_URL = 'http://localhost:8000/api/chat';
        const HEALTH_URL = 'http://localhost:8000/health';

        // 会话ID
        let sessionId = null;

        // 初始化
        window.onload = function() {
            checkHealth();
            setupEventListeners();
        };

        // 设置事件监听
        function setupEventListeners() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');

            // 回车发送
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // 禁用/启用发送按钮
            input.addEventListener('input', function() {
                sendBtn.disabled = this.value.trim() === '';
            });
        }

        // 检查健康状态
        async function checkHealth() {
            try {
                const response = await fetch(HEALTH_URL);
                const data = await response.json();

                if (data.status === 'healthy') {
                    updateStatus(true);
                } else {
                    updateStatus(false);
                }
            } catch (error) {
                updateStatus(false);
                console.error('健康检查失败:', error);
            }
        }

        // 更新状态
        function updateStatus(connected) {
            const statusEl = document.getElementById('status');

            if (connected) {
                statusEl.className = 'status connected';
                statusEl.textContent = '✅ 服务已连接，可以开始对话';
            } else {
                statusEl.className = 'status disconnected';
                statusEl.textContent = '❌ 服务未连接，请检查服务器是否启动';
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // 显示用户消息
            addMessage('user', message);

            // 清空输入框
            input.value = '';
            document.getElementById('sendBtn').disabled = true;

            // 显示加载中
            const loadingId = addLoading();

            try {
                // 发送API请求
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error('API请求失败');
                }

                const data = await response.json();

                // 保存会话ID
                sessionId = data.session_id;

                // 移除加载中
                removeLoading(loadingId);

                // 显示助手消息
                addMessage('assistant', data.message);

            } catch (error) {
                // 移除加载中
                removeLoading(loadingId);

                // 显示错误消息
                addMessage('assistant', '❌ 对话失败，请检查服务器连接');

                console.error('发送消息失败:', error);
                updateStatus(false);
            }

            // 重新检查健康状态
            setTimeout(checkHealth, 1000);
        }

        // 发送快捷问题
        function sendQuickQuestion(question) {
            document.getElementById('messageInput').value = question;
            sendMessage();
        }

        // 添加消息
        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const strong = document.createElement('strong');
            strong.textContent = role === 'user' ? '👤 你' : '🤖 嗨萌马';

            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');

            messageDiv.appendChild(strong);
            messageDiv.appendChild(contentDiv);

            container.appendChild(messageDiv);

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 添加加载中
        function addLoading() {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loading-' + Date.now();

            const strong = document.createElement('strong');
            strong.textContent = '🤖 嗨萌马';

            const loading = document.createElement('span');
            loading.className = 'loading';

            messageDiv.appendChild(strong);
            messageDiv.appendChild(loading);

            container.appendChild(messageDiv);

            // 滚动到底部
            container.scrollTop = container.scrollHeight;

            return messageDiv.id;
        }

        // 移除加载中
        function removeLoading(id) {
            const loading = document.getElementById(id);
            if (loading) {
                loading.remove();
            }
        }
    </script>
</body>
</html>
